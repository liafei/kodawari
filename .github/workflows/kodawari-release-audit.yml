name: Kodawari Release Audit

on:
  push:
    branches:
      - "release/**"
    tags:
      - "v*"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build dist
        run: python -m pip install build && python -m build
      - name: Audit release artifacts
        run: python scripts/release_audit.py dist --output planning/release_audit.json

